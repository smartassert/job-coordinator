framework:
    messenger:
        buses:
            messenger.bus.default:
                middleware:
                    - App\Messenger\DelayMiddleware
        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    auto_setup: false
            sync: 'sync://'

        routing:
            '*': async
            Symfony\Component\RemoteEvent\Messenger\ConsumeRemoteEventMessage: sync

when@test:
    framework:
        messenger:
            transports:
                async: 'in-memory://'
